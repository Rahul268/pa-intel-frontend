name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel (no cache)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          vercel --prod \
            --yes \
            --no-cache \
            --token="$VERCEL_TOKEN" \
            --env NEXT_PUBLIC_BACKEND_URL=https://pa-intel-api.onrender.com \
            2>&1 | tee /tmp/vercel_out.txt

          cat /tmp/vercel_out.txt
          echo ""
          PROD_URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.vercel\.app' /tmp/vercel_out.txt | tail -1)
          echo "=============================="
          echo "Live URL: https://pa-intel-frontend.vercel.app"
          echo "Build URL: $PROD_URL"
          echo "=============================="
