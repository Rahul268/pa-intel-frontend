name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Link Vercel project
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          vercel link --yes --token="$VERCEL_TOKEN"
          echo "Project linked:"
          cat .vercel/project.json

      - name: Pull Vercel env
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          vercel env pull .env.production --yes --token="$VERCEL_TOKEN" || true
          # Ensure NEXT_PUBLIC_BACKEND_URL is set
          echo "NEXT_PUBLIC_BACKEND_URL=https://pa-intel-api.onrender.com" >> .env.production

      - name: Build (local, from source)
        run: npm run build

      - name: Deploy prebuilt to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          OUTPUT=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN" 2>&1)
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -oE 'https://[a-zA-Z0-9.-]+\.vercel\.app' | tail -1)
          echo ""
          echo "=============================="
          echo "Deployed to: $URL"
          echo "Canonical:   https://pa-intel-frontend.vercel.app"
          echo "=============================="
