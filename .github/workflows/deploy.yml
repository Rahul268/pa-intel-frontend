name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Link project and extract IDs
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          vercel link --yes --token="$VERCEL_TOKEN"
          echo "VERCEL_ORG_ID=$(jq -r .orgId .vercel/project.json)"     >> $GITHUB_ENV
          echo "VERCEL_PROJECT_ID=$(jq -r .projectId .vercel/project.json)" >> $GITHUB_ENV
          echo "Linked — org=$(jq -r .orgId .vercel/project.json) project=$(jq -r .projectId .vercel/project.json)"

      - name: Set backend URL
        run: echo "NEXT_PUBLIC_BACKEND_URL=https://pa-intel-api.onrender.com" > .env.production

      - name: Build
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --token="$VERCEL_TOKEN"

      - name: Deploy to production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
          echo "✅ Live: https://pa-intel-frontend.vercel.app"
