name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set +e
          OUTPUT=$(vercel --prod --yes \
            --token="$VERCEL_TOKEN" \
            --env NEXT_PUBLIC_BACKEND_URL=https://pa-intel-api.onrender.com \
            2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          
          # Extract production URL (handles multiple URL formats Vercel outputs)
          PROD_URL=$(echo "$OUTPUT" | grep -E 'https://[a-zA-Z0-9.-]+\.vercel\.app' | tail -1 | tr -d '[:space:]')
          
          if [ -z "$PROD_URL" ]; then
            # Try alternate extraction
            PROD_URL=$(echo "$OUTPUT" | grep -oE 'https://[^ ]+\.vercel\.app' | tail -1)
          fi
          
          echo "DEPLOY_URL=$PROD_URL" >> $GITHUB_OUTPUT
          echo "$PROD_URL" > /tmp/deploy_url.txt
          echo ""
          echo "====================================="
          echo "Live URL: $PROD_URL"
          echo "====================================="

      - name: Save URL to file
        run: |
          URL="${{ steps.deploy.outputs.DEPLOY_URL }}"
          echo "$URL" > DEPLOYMENT_URL.txt
          cat DEPLOYMENT_URL.txt
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add DEPLOYMENT_URL.txt
          git diff --staged --quiet || git commit -m "ci: save deployment URL [skip ci]"
          git push origin HEAD:main || echo "Push skipped"
