name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          vercel --prod \
            --yes \
            --token="$VERCEL_TOKEN" \
            --env NEXT_PUBLIC_BACKEND_URL=https://pa-intel-api.onrender.com \
            2>&1 | tee deploy_output.txt

          # Extract and display the deployment URL
          DEPLOY_URL=$(grep -oP 'https://[^ ]+\.vercel\.app' deploy_output.txt | tail -1)
          echo ""
          echo "======================================"
          echo "✅ DEPLOYMENT COMPLETE"
          echo "🌐 Live URL: $DEPLOY_URL"
          echo "======================================"
